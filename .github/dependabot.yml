version: 2
updates:
  # Keep npm dependencies patched automatically
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"

  # Keep GitHub Actions pinned versions updated
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
